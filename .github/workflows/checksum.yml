name: Generate checksum for Shellscripts

on:
  push:
    branches: [ "main" ]
    paths:
      - "*.sh"

jobs:
  checksum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate checksum
        run: |
          for f in *.sh; do
            sha256sum "$f" > "$f.sha256"
          done
      - name: Commit and push
        run: |
          git config user.name "git-action"
          git config user.email "noreply@dc5v.com"
          git add *.sha256
          git commit -m "Generated SHA256 checksum" || echo "1No changes"
          git push
